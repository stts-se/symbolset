# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build Status

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

    - name: Go report card
      uses: creekorful/goreportcard-action@v1.0

    - name: Setup
      run: |
       RELEASE=master
       cd server
       git clone https://github.com/stts-se/wikispeech-lexdata.git
       cd wikispeech-lexdata
       git checkout $RELEASE || echo "No such release for lexdata. Using master."
       cd ..
       bash setup.sh wikispeech-lexdata ss_files
       
    - name: Start server
      run: |
       SLEEP=30
       cd server
       go run *.go -ss_files ss_files &
       export pid=$!
       echo "symbolset server started on pid $pid. wait for $SLEEP seconds before shutting down"
       sleep $SLEEP

       curl -f http://localhost:8771/ping

       #cd ..
       #sh .github/workflows/exit_server_and_fail_if_not_running.sh symbolset $pid
 

